name: Release

on:
  workflow_call:
    inputs:
      formula:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      formula:
        required: false
        type: string

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.setup.outputs.formulas }}
      date: ${{ steps.setup.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: date
      - run: date +%Y%m%d
      - id: setup
        env:
          FORMULA_FILTER: ${{ inputs.formula }}
        run: |
          list=$(ls Formula/rv-ruby* | jq --raw-input | jq --slurp --compact-output 'map(. |= .[8:-3])')
          if [[ -n "$FORMULA_FILTER" ]]; then
            # if we passed a string, only build matches
            list=$(echo "$list" | jq --compact-output --arg f "$FORMULA_FILTER" 'map(select(. | contains($f)))')
          else
            # without a filter, build all but rv-ruby-dev
            list=${list/'"'rv-ruby-dev'"',/}
          fi
          echo 'setting $formulas to:'
          echo "$list"
          echo formulas=$list >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

  build-homebrew:
    needs: setup
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJSON(needs.setup.outputs.formulas) }}
    uses: ./.github/workflows/build.yml
    with:
      formula: ${{ matrix.formula }}

  build-alpine:
    needs: setup
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJSON(needs.setup.outputs.formulas) }}
    uses: ./.github/workflows/build-alpine.yml
    with:
      formula: ${{ matrix.formula }}

  release:
    needs: [setup, build-homebrew, build-alpine]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    env:
      TAG: ${{ needs.setup.outputs.date }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew tap spinel-coop/rv-ruby .

      - name: Checkout branch
        run: git checkout "${GITHUB_REF_NAME}"

      - name: Install gems
        run: brew install-bundler-gems --groups=pr_upload

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@main

      - name: Setup directory
        run: mkdir rubies

      - name: Download rubies
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rv-ruby*
          path: rubies
          merge-multiple: true

      - name: Generate SHA256 checksums
        if: ${{ inputs.formula == '' }}
        working-directory: rubies
        run: |
          shopt -s nullglob
          files=(*.tar.gz)
          if (( ${#files[@]} == 0 )); then
            echo "No tarballs found in rubies/" >&2
            exit 1
          fi
          shasum -a 256 -- "${files[@]}" > SHA256SUMS

      - name: Upload to GitHub Packages
        if: ${{ inputs.formula == '' || inputs.formula == 'rv-ruby-dev' }}
        working-directory: rubies
        env:
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.actor }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ github.token }}
        run: brew rv-upload --debug --root-url="https://ghcr.io/v2/${GITHUB_REPOSITORY,,}"

      - name: Push tag
        if: ${{ inputs.formula == '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" --notes "rv ruby ${TAG}" --target "$(git rev-parse --verify HEAD)" --title "${TAG}" --prerelease

      - name: Upload Homebrew bottles to GitHub Releases
        if: ${{ inputs.formula == '' || inputs.formula == 'rv-ruby-dev' }}
        working-directory: rubies
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: brew rv-upload --debug --root-url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

      - name: Upload Alpine tarballs to GitHub Releases
        if: ${{ inputs.formula == '' || inputs.formula == 'rv-ruby-dev' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for f in rubies/*musl*.tar.gz; do
            [ -f "$f" ] || continue
            echo "Uploading Alpine artifact: $f"
            gh release upload "${TAG}" "$f" --clobber
          done

      - name: Upload checksums to GitHub Release
        if: ${{ inputs.formula == '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" rubies/SHA256SUMS --clobber

      - name: Verify checksums
        if: ${{ inputs.formula == '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        working-directory: rubies
        run: |
          gh release download "${TAG}" --pattern SHA256SUMS --dir /tmp/verify --clobber
          diff SHA256SUMS /tmp/verify/SHA256SUMS
          shasum -a 256 -c /tmp/verify/SHA256SUMS

      - name: Generate release artifact provenance attestations
        if: ${{ inputs.formula == '' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: rubies/SHA256SUMS

      - name: Release
        if: ${{ inputs.formula == '' || inputs.formula == 'rv-ruby-dev' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${TAG}" --verify-tag --prerelease=false --latest

      - name: Cleanup
        run: rm -rvf rubies
